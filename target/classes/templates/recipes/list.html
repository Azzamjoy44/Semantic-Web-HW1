<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>All Recipes | Recipe Recommender</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="main-content">
    <div th:if="${successMessage}" class="alert alert-success">
        <span class="alert-icon">✓</span> <span th:text="${successMessage}"></span>
    </div>

    <div class="page-header">
        <div class="container">
            <h1 class="page-title">📋 All Recipes</h1>
            <p class="page-subtitle">Showing all <strong th:text="${#lists.size(recipes)}">0</strong> recipes from the XML database.</p>
            <a th:href="@{/recipes/add}" class="btn btn-primary">+ Add New Recipe</a>
        </div>
    </div>

    <div class="container">
        <div class="recipe-grid" th:if="${!#lists.isEmpty(recipes)}">
            <div class="recipe-card" th:each="recipe : ${recipes}">
                <div class="recipe-card-header">
                    <h3 class="recipe-title" th:text="${recipe.title}">Recipe Title</h3>
                    <span class="difficulty-badge"
                          th:classappend="${recipe.primaryDifficulty == 'Beginner' ? ' beginner' : (recipe.primaryDifficulty == 'Intermediate' ? ' intermediate' : ' advanced')}"
                          th:text="${recipe.primaryDifficulty}">Difficulty</span>
                </div>
                <div class="recipe-card-body">
                    <p class="recipe-description" th:text="${recipe.description}">Description</p>
                    <div class="recipe-meta">
                        <span class="meta-item">
                            <span class="meta-label">Cuisines:</span>
                            <span th:text="${recipe.cuisinesDisplay}">Italian, French</span>
                        </span>
                        <span class="meta-item">
                            <span class="meta-label">Prep:</span>
                            <span th:text="${recipe.prepTime} + ' min'">0 min</span>
                        </span>
                        <span class="meta-item">
                            <span class="meta-label">Cook:</span>
                            <span th:text="${recipe.cookTime} + ' min'">0 min</span>
                        </span>
                        <span class="meta-item">
                            <span class="meta-label">Total:</span>
                            <span th:text="${recipe.totalTime} + ' min'">0 min</span>
                        </span>
                    </div>

                </div>
                <div class="recipe-card-footer">
                    <a th:href="@{/recipes/{id}(id=${recipe.id})}" class="btn btn-outline btn-sm">View Details</a>
                </div>
            </div>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(recipes)}">
            <p>No recipes found. <a th:href="@{/recipes/add}">Add the first one!</a></p>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/navbar :: footer}"></footer>
</body>
</html>
