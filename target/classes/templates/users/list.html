<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Users | Recipe Recommender</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="main-content">
    <div th:if="${successMessage}" class="alert alert-success container">
        <span class="alert-icon">✓</span> <span th:text="${successMessage}"></span>
    </div>

    <div class="page-header">
        <div class="container">
            <h1 class="page-title">👤 Users</h1>
            <p class="page-subtitle">All registered users. The first user is used for recipe recommendations.</p>
            <a th:href="@{/users/add}" class="btn btn-primary">+ Add New User</a>
        </div>
    </div>

    <div class="container">
        <div class="user-grid" th:if="${!#lists.isEmpty(users)}">
            <div class="user-card-full" th:each="user, stat : ${users}">
                <div class="user-avatar">
                    <span th:text="${user.name.substring(0,1).toUpperCase()}">A</span>
                </div>
                <div class="user-details">
                    <h3 th:text="${user.fullName}">Full Name</h3>
                    <p class="user-id">ID: <code th:text="${user.id}">u001</code></p>
                    <div class="user-tags">
                        <span class="tag tag-skill" th:text="'Skill: ' + ${user.cookingSkillLevel}">Skill</span>
                        <span class="tag tag-cuisine" th:text="'Cuisine: ' + ${user.preferredCuisine}">Cuisine</span>
                    </div>
                    <p class="first-user-note" th:if="${stat.first}">★ This user is used for recipe recommendations.</p>
                </div>
                <div class="user-actions">
                    <a th:href="@{/recipes/recommend/by-skill(userId=${user.id})}" class="btn btn-sm btn-outline">Recommendations</a>
                </div>
            </div>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(users)}">
            <p>No users yet. <a th:href="@{/users/add}">Add your first user</a>.</p>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/navbar :: footer}"></footer>
</body>
</html>
