<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Add User | Recipe Recommender</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="main-content">
    <div class="page-header">
        <div class="container">
            <a th:href="@{/}" class="back-link">← Back to Home</a>
            <h1 class="page-title">👤 Add New User</h1>
            <p class="page-subtitle">Create a user profile. The first user's preferences are used for recipe recommendations.</p>
        </div>
    </div>

    <div class="container">
        <div class="alert alert-error" th:if="${errors != null and !#lists.isEmpty(errors)}">
            <strong>Please fix the following errors:</strong>
            <ul>
                <li th:each="err : ${errors}" th:text="${err}">Error</li>
            </ul>
        </div>

        <div class="form-card">
            <form th:action="@{/users/add}" method="post" class="recipe-form">

                <div class="form-row">
                    <div class="form-group">
                        <label for="name" class="form-label">First Name <span class="required">*</span></label>
                        <input type="text" id="name" name="name" class="form-input"
                               th:value="${formName}"
                               placeholder="e.g. Azzam" required maxlength="100"/>
                    </div>
                    <div class="form-group">
                        <label for="surname" class="form-label">Last Name <span class="required">*</span></label>
                        <input type="text" id="surname" name="surname" class="form-input"
                               th:value="${formSurname}"
                               placeholder="e.g. Zafar" required maxlength="100"/>
                    </div>
                </div>

                <div class="form-group">
                    <label for="cookingSkillLevel" class="form-label">Cooking Skill Level <span class="required">*</span></label>
                    <select id="cookingSkillLevel" name="cookingSkillLevel" class="form-select" required>
                        <option value="">— Select Skill Level —</option>
                        <option th:each="d : ${difficultyLevels}"
                                th:value="${d}"
                                th:text="${d}"
                                th:selected="${d == formSkill}">Intermediate</option>
                    </select>
                    <small class="form-hint">
                        <strong>Beginner</strong> — Learning basics.
                        <strong>Intermediate</strong> — Comfortable with most recipes.
                        <strong>Advanced</strong> — Expert cook.
                    </small>
                </div>

                <div class="form-group">
                    <label for="preferredCuisine" class="form-label">Preferred Cuisine <span class="required">*</span></label>
                    <select id="preferredCuisine" name="preferredCuisine" class="form-select" required>
                        <option value="">— Select Cuisine —</option>
                        <option th:each="c : ${cuisineTypes}"
                                th:value="${c}"
                                th:text="${c}"
                                th:selected="${c == formCuisine}">Italian</option>
                    </select>
                </div>

                <div class="form-actions">
                    <a th:href="@{/}" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save User</button>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/navbar :: footer}"></footer>
</body>
</html>
